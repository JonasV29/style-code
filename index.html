<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Youtube</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="images/youtube-logo.png" type="image/x-icon">
</head>
<body>
    <header>
        <section>
             <div class="head">
                <div class="menu-bar">
                    <div></div>
                    <div></div>
                    <div></div>
                 
                    <img class= "brand" src="images/barra_youtube.png" alt="logo do youtube">
                   </div>

                <div class="note-bar">
                    <div class="search">  
                        <img src="images/search.png" alt="photo of search"> 
                    </div>    
                </div>

                <div class="photo">
               <img src="images/video-camera.png" alt="image of camera">

                <img src="images/notification.png" alt="image of notification">

                <img src="images/profile.png" alt="image of avatar">
                </div>
               
                </div>
        </section>
     </header>

    <main>
        <section class="box">
        <div class="play">

          <div class="video">
             <img  class="pause-button" src="images/pause-button.png" alt=" pause-button">  
          </div>

          <p class="name_video"> Semana Front-end | Dia 01: Construindo uma Landing Page no Mundo Invertido com HTML e CSS</p>
           
          <div class="play_two">

          <img  class="avatar" src="images/user.png" alt="avatar"> 

           <div class="info">
           <h3 style="font-weight: bold;">DIO</h3>
           <p class="int">83,3 mil inscritos</p>
           </div>
           
             <button class="click">Subscribe</button>
             
             <div class="like">
                <button class="action-button"> 👍 Like</button> 
             </div>

             <div class="dislike">
                  <button class="action-button"> 👎Dislike </button> 
                          
            </div>

          </div>

           <p class="title"> 28.450 visualizações Transmitido ao vivo em 23 ago. de 2022</p>
           
        </div>  
       
        <div class="Sidebar">
            <div class="video-1"></div>
            <div class="video-2"></div>
            <div class="video-3"></div>
            <div class="video-4"></div>
            <div class="video-5"></div>
            <div class="video-6"></div>
            <div class="video-7"></div>
            <div class="video-8"></div>
        </div>
       <p> DIO - Trilha estratégica</p>
       </section>

    </main>
    
    <footer>

    </footer>
</html>
